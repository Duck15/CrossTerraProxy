# .github/workflows/go-build.yml
name: Go Multi-Platform Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'proxy.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'proxy.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:  # ✅ 添加手动触发支持
    inputs:
      force_build:
        description: 'Force build even if no proxy.go changes'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: proxy-linux-amd64
          - goos: linux
            goarch: arm64
            binary_name: proxy-linux-arm64
          - goos: windows
            goarch: amd64
            binary_name: proxy-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            binary_name: proxy-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary_name: proxy-darwin-arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
        cache: true

    # ✅ 可选：手动触发时跳过 paths 检查
    - name: Check if should build
      if: github.event_name != 'workflow_dispatch' || inputs.force_build == 'true'
      run: echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}"

    - name: Build ${{ matrix.binary_name }}
      if: github.event_name != 'workflow_dispatch' || inputs.force_build == 'true'
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        go build -v -o ${{ matrix.binary_name }} -ldflags="-s -w" ./proxy.go

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.binary_name }}
        path: ${{ matrix.binary_name }}
        retention-days: 7
